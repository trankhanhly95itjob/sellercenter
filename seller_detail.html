<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý nhà bán</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path
            d="M13.5 2h-3v4h3V2ZM17.15 6.16l-2.12 2.12 2.12 2.12 2.12-2.12-2.12-2.12ZM6.85 6.16 4.73 8.28l2.12 2.12 2.12-2.12-2.12-2.12ZM19 13.5h4v-3h-4v3ZM11 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3Zm-6 4H1v-3h4v3ZM2.5 12h2v-3h-2v3ZM22.5 12h-2v3h2v-3ZM17 21h-2v-2h2v2ZM9 21H7v-2h2v2Z" />
        </svg>
      </div>
      <div class="page-title">QUẢN LÝ NHÀ BÁN</div>
    </div>
    <div class="header-right">
      <div class="user-profile">
        <img src="https://i.pravatar.cc/100?img=11" alt="User Avatar">
        <div class="user-info">
          <div class="user-name">
            81759 <span class="user-role-badge">Admin</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="m6 9 6 6 6-6" />
            </svg>
          </div>
          <div class="user-dept">BP Mua Chia - IT</div>
        </div>
      </div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="menu-item">
      <div class="icon-wrapper bg-home"><svg>
          <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg></div>
    </div>
    <div class="menu-item">
      <div class="icon-wrapper bg-link"><svg>
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
        </svg></div>
    </div>
    <div class="menu-item active">
      <div class="icon-wrapper bg-tag"><svg>
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
          <line x1="7" y1="7" x2="7.01" y2="7"></line>
        </svg></div>
    </div>
    <div class="menu-item">
      <div class="icon-wrapper bg-user"><svg>
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg></div>
    </div>
    <div class="menu-item">
      <div class="icon-wrapper bg-task"><svg>
          <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
          <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
        </svg></div>
    </div>
    <div class="menu-item">
      <div class="icon-wrapper bg-bag"><svg>
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <path d="M16 10a4 4 0 0 1-8 0"></path>
        </svg></div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <div class="content-header">
      <h1 class="content-title">Thêm nhà bán</h1>
    </div>

    <form id="sellerForm">
      <!-- General Info Panel -->
      <div class="panel">
        <h2 class="panel-title">Thông tin chung</h2>

        <div class="form-group">
          <label class="form-label">Tên nhà bán</label>
          <input type="text" class="form-control" name="businessSellerName" placeholder="Nhập tên nhà bán" required>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Mapping Nhà cung cấp ERP MWG</label>
            <select class="form-control" name="supplierId" required>
              <option value="">Chọn nhà cung cấp ERP MWG</option>
              <option value="41420">41420 - CÔNG TY CỔ PHẦN TEKO VIỆT NAM</option>
              <option value="41421">41421 - CÔNG TY TNHH PHÁT TRIỂN PHẦN MỀM ABC</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Công ty</label>
            <select class="form-control" name="companyId" required>
              <option value="">Chọn công ty</option>
              <option value="1">1 - CTY Điện Máy Xanh</option>
              <option value="2">2 - CTY Bách Hóa Xanh</option>
              <option value="16">16 - CTY AVAKIDS</option>

            </select>
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Chuỗi kinh doanh</label>
            <select class="form-control" name="companyBrandId" required>
              <option value="">Chọn chuỗi kinh doanh</option>
              <option value="1">1 - Thế Giới Di Động</option>
              <option value="2">2 - Điện Máy Xanh</option>
              <option value="23">23 - AVAKIDS</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Website</label>
            <select class="form-control" name="websiteId" required>
              <option value="">Chọn Website</option>
              <option value="1">1 - thegioididong.com</option>
              <option value="2">2 - dienmayxanh.com</option>
              <option value="17">17 - avakids.com</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Warehouse Panel -->
      <div class="panel">
        <h2 class="panel-title">Danh sách kho hàng</h2>

        <div id="warehouseContainer">
          <!-- Dynamically added warehouse rows go here -->
          <div class="store-item">
            <button type="button" class="btn-remove-store" onclick="removeStore(this)">Xóa kho</button>
            <div class="grid-2">
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">Tên kho hàng</label>
                <input type="text" class="form-control store-name-input" placeholder="Nhập tên kho hàng" required>
              </div>
              <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label">Mapping Kho ERP MWG</label>
                <select class="form-control store-id-input" required>
                  <option value="">Chọn kho ERP MWG</option>
                  <option value="30479">30479 - FBM_HCM - Kho đối tác TEKO</option>
                  <option value="30480">30480 - FBM_HNO - Kho đối tác TEKO</option>
                  <option value="30481">30481 - FBM_DNA - Kho đối tác TEKO</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <button type="button" class="btn-add-store" id="btnAddStore">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Thêm kho hàng
        </button>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="button" class="btn btn-secondary" onclick="window.location.href='seller_list.html'">Hủy</button>
        <button type="submit" class="btn btn-primary">Thêm mới</button>
      </div>
    </form>
  </main>

  <script src="script.js"></script>
</body>

</html>
