<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh sách Nhà Bán</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="logo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 2h-3v4h3V2ZM17.15 6.16l-2.12 2.12 2.12 2.12 2.12-2.12-2.12-2.12ZM6.85 6.16 4.73 8.28l2.12 2.12 2.12-2.12-2.12-2.12ZM19 13.5h4v-3h-4v3ZM11 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3Zm-6 4H1v-3h4v3ZM2.5 12h2v-3h-2v3ZM22.5 12h-2v3h2v-3ZM17 21h-2v-2h2v2ZM9 21H7v-2h2v2Z" /></svg></div>
      <div class="page-title">QUẢN LÝ NHÀ BÁN</div>
    </div>
    <div class="header-right">
      <div class="user-profile"><img src="https://i.pravatar.cc/100?img=11" alt="User Avatar">
        <div class="user-info"><div class="user-name">81759 <span class="user-role-badge">Admin</span></div><div class="user-dept">BP Mua Chia - IT</div></div>
      </div>
    </div>
  </header>

  <aside class="sidebar">
    <div class="menu-item" onclick="window.location.href='dashboard.html'" title="Dashboard"><div class="icon-wrapper bg-home"><svg><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div></div>
    <div class="menu-item active" onclick="window.location.href='bs_list.html'" title="Quản lý Nhà bản"><div class="icon-wrapper bg-tag"><svg><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg></div></div>
    <div class="menu-item" onclick="window.location.href='store_list.html'" title="Quản lý Kho hàng"><div class="icon-wrapper bg-bag"><svg><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg></div></div>
  </aside>

  <main class="main-content">
    <div class="content-header"><h1 class="content-title">Danh sách Nhà bán (Business Sellers)</h1></div>
    <div class="toolbar">
      <div class="search-container">
        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input type="text" class="search-input" placeholder="Tìm theo ID hoặc tên nhà bán...">
      </div>
      <button class="btn btn-primary" onclick="window.location.href='bs_create.html'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        Tạo nhà bán mới
      </button>
    </div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Tên Nhà Bán</th>
            <th>Nhà cung cấp (ERP)</th>
            <th>Công ty đăng ký</th>
            <th style="text-align: right;">Hành động</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>111</td>
            <td style="font-weight: 600;">CÔNG TY CỔ PHẦN TEKO VIỆT NAM</td>
            <td>41420 - LÊN ERP MAPPING</td>
            <td>1 - Công Ty Cổ Phần Đầu Tư Điện Máy Xanh</td>
            <td>
              <div class="action-links">
                <a href="bs_edit.html?id=111" class="link-edit">Chỉnh sửa</a>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
