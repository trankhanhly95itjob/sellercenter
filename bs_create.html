<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tạo mới Nhà Bán</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="header-left">
      <div class="logo"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 2h-3v4h3V2ZM17.15 6.16l-2.12 2.12 2.12 2.12 2.12-2.12-2.12-2.12ZM6.85 6.16 4.73 8.28l2.12 2.12 2.12-2.12-2.12-2.12ZM19 13.5h4v-3h-4v3ZM11 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3Zm-6 4H1v-3h4v3ZM2.5 12h2v-3h-2v3ZM22.5 12h-2v3h2v-3ZM17 21h-2v-2h2v2ZM9 21H7v-2h2v2Z" /></svg></div>
      <div class="page-title">QUẢN LÝ NHÀ BÁN</div>
    </div>
    <div class="header-right">
      <div class="user-profile"><img src="https://i.pravatar.cc/100?img=11" alt="User Avatar">
        <div class="user-info"><div class="user-name">81759 <span class="user-role-badge">Admin</span></div><div class="user-dept">BP Mua Chia - IT</div></div>
      </div>
    </div>
  </header>

  <aside class="sidebar">
    <div class="menu-item" onclick="window.location.href='dashboard.html'" title="Dashboard"><div class="icon-wrapper bg-home"><svg><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></div></div>
    <div class="menu-item active" onclick="window.location.href='bs_list.html'" title="Quản lý Nhà bản"><div class="icon-wrapper bg-tag"><svg><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg></div></div>
    <div class="menu-item" onclick="window.location.href='store_list.html'" title="Quản lý Kho hàng"><div class="icon-wrapper bg-bag"><svg><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg></div></div>
  </aside>

  <main class="main-content">
    <div class="content-header"><h1 class="content-title">Tạo mới Nhà Bán</h1></div>

    <div class="panel">
      <h2 class="panel-title">1. Thông tin chung</h2>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Tên nhà bán (Business Seller Name) <span style="color:red">*</span></label>
          <input type="text" class="form-control" placeholder="Nhập tên nhà bán...">
        </div>
        <div class="form-group">
          <label class="form-label">Mã nhà cung cấp ERP (Supplier ID) <span style="color:red">*</span></label>
          <select class="form-control">
            <option value="">-- Chọn Nhà Cung Cấp Map Với ERP --</option>
            <option value="41420">41420 - CÔNG TY CỔ PHẦN TEKO VIỆT NAM</option>
          </select>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2 class="panel-title">2. Phạm vi thương mại</h2>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label">Thuộc công ty (Company ID) <span style="color:red">*</span></label>
          <select class="form-control">
            <option value="1">1 - Công Ty Cổ Phần Đầu Tư Điện Máy Xanh</option>
            <option value="2">2 - Công ty khác...</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Thương hiệu bán lẻ (Brand ID) <span style="color:red">*</span></label>
          <select class="form-control">
            <option value="2">2 - dienmayxanh</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Website (Website ID) <span style="color:red">*</span></label>
          <select class="form-control">
            <option value="2">2 - dienmayxanh.com</option>
          </select>
        </div>
      </div>
    </div>
    
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="window.location.href='bs_list.html'">Hủy bỏ</button>
      <button class="btn btn-primary">Xác nhận tạo mới</button>
    </div>
  </main>
</body>
</html>
